      --content-margin: 5vw;
      --phone-primary: #0095F6;
      --phone-secondary: #8A3AB9;

      --phone-bg-color: linear-gradient(135deg, #121212, #1E1E1E, #262626);
    }

    /* 기본 스타일 */
    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      scroll-behavior: smooth;
      background-color: black;
      font-family: "Urbanist", Arial, sans-serif;
    }

    body::-webkit-scrollbar {
      width: 8px;
    }

    body::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 4px;
    }

    /* 다음 페이지 이동 버튼 */
    #next-page-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: linear-gradient(135deg, #ff6b6b, #ff5252);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px 40px;
      font-size: 1.3rem;
      font-family: "Urbanist", Arial, sans-serif;
      font-weight: 700;
      cursor: pointer;
      z-index: 100;
      opacity: 0;
      transform: translateY(30px) scale(0.9);
      transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
      letter-spacing: 1px;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    #next-page-btn.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    #next-page-btn:hover {
      background: linear-gradient(135deg, #ff5252, #ff3333);
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 40px rgba(255, 107, 107, 0.6);
      border-color: rgba(255, 255, 255, 0.4);
    }

    #next-page-btn:active {
      transform: translateY(-2px) scale(1.02);
    }

    /* 이전 페이지 이동 버튼 */
    #prev-page-btn {
      position: fixed;
      bottom: 30px;
      left: 30px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50px;
      padding: 16px 40px;
      font-size: 1.3rem;
      font-family: "Urbanist", Arial, sans-serif;
      font-weight: 700;
      cursor: pointer;
      z-index: 100;
      opacity: 0;
      transform: translateY(30px) scale(0.9);
      transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      letter-spacing: 1px;
    }

    #prev-page-btn.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    #prev-page-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.6);
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
    }

    #prev-page-btn:active {
      transform: translateY(-2px) scale(1.02);
    }

    /* 컨테이너 및 공통 요소 */
    .container {
      min-height: 100vh;
      position: relative;
      opacity: 1;
    }

    /* 배경 레이어 - 가장 아래 */
    .background-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .video-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: none !important;
    }

    /* 로고 스타일 - 가장 위에 */
    .logo-layer {
      position: fixed;
      top: 80px;
      left: 60px;
      z-index: 30;
      pointer-events: auto;
    }

    .logo {
      width: 120px;
      height: auto;
      cursor: pointer;
      transition: transform 0.3s, opacity 0.3s;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
      pointer-events: auto;
    }

    .logo:hover {
      transform: scale(1.05);
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.5));
    }

    /* 콘텐츠 레이어 */
    .content-layer {
      position: relative;
      z-index: 20;
      min-height: 100vh;
    }

    .scroll-content {
      padding-top: 100vh;
      min-height: 500vh;
      padding-left: var(--content-margin);
      padding-right: var(--content-margin);
      padding-bottom: 150px;
    }

    /* 모든 섹션에 일관된 간격 적용 */
    .scroll-section {
      min-height: 100vh;
      display: flex;
      opacity: 0;
      transform: translateY(100px);
      will-change: opacity, transform;
      align-items: center;
      margin-bottom: 150px;
    }

    .content-wrapper {
      display: flex;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
    }

    /* 섹션 15-18을 위한 새로운 레이아웃 클래스 */

      align-items: flex-start;
      gap: 30px;
    }

      width: 100%;
      display: flex;

      filter: brightness(1.1);

      will-change: transform, opacity;
      transition: all 0.6s ease-out;
      font-family: "Urbanist", Arial, sans-serif;
      filter: blur(2px);
    }

    .scroll-indicator {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgb(255, 251, 240);
      font-size: 1rem;
      z-index: 30;
      opacity: 0.7;
      animation: bounce 2s infinite;
      font-family: "Urbanist", Arial, sans-serif;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .scroll-indicator.hidden {
      opacity: 0;
    }

    .circle {
      position: absolute;
      width: var(--lens-size);
      height: var(--lens-size);
      background: url("images3/BG_Image_03.png") center center no-repeat fixed;
      background-size: cover;
      mask-image: radial-gradient(circle, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0.5) 10%, rgba(0, 0, 0, 0.3) 20%, rgba(0, 0, 0, 0.15) 30%, rgba(0, 0, 0, 0) 50%);
      transition: 2.0s;
      z-index: 0;
      pointer-events: none;
    }

    .fadeOut {
      animation: fadeOut 1.5s forwards;
    }

    @keyframes fadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0) translateX(-50%); }
      40% { transform: translateY(-10px) translateX(-50%); }
      60% { transform: translateY(-5px) translateX(-50%); }
    }

  <script>
    // 페이지 이동 함수
    function goToNextPage() {
      window.location.href = "index4.html";
    }

    function goToPrevPage() {
      window.location.href = "index.html";
    }

    function goToFirstPage() {
      window.location.href = "index.html";
    }

    // 다음/이전 페이지 버튼 설정
    function setupNavigationButtons() {
      const nextPageBtn = document.getElementById('next-page-btn');
      const prevPageBtn = document.getElementById('prev-page-btn');
      const scrollIndicator = document.querySelector('.scroll-indicator');

      window.addEventListener('scroll', function() {
        const scrollPosition = window.scrollY;
        const windowHeight = window.innerHeight;
        const documentHeight = document.documentElement.scrollHeight;

        if (documentHeight - (scrollPosition + windowHeight) < 200) {
          nextPageBtn.classList.add('show');
          if (scrollIndicator) scrollIndicator.classList.add('hidden');
        } else {
          nextPageBtn.classList.remove('show');
          if (scrollIndicator) scrollIndicator.classList.remove('hidden');
        }

        if (scrollPosition > 100) {
          prevPageBtn.classList.add('show');
        } else {
          prevPageBtn.classList.remove('show');
        }
      });

      nextPageBtn.addEventListener('click', goToNextPage);
      prevPageBtn.addEventListener('click', goToPrevPage);
    }

    // 섹션0 애니메이션
    function startSection0Animation() {
      const separator = document.querySelector('#section0 .separator');
      const textParts = document.querySelectorAll('#section0 .text-part');

      if (separator) {
        gsap.to(separator, {
          opacity: 1,
          scaleY: 1,
          duration: 0.8,
          delay: 0.5,
          ease: "power2.out"
        });
      }

      if (textParts.length > 0) {
        gsap.to(textParts[0], {
          opacity: 1,
          y: 0,
          filter: "blur(0)",
          duration: 1,
          delay: 0.8,
          ease: "power2.out"
        });

        if (textParts.length > 1) {
          gsap.to(textParts[1], {
            opacity: 1,
            y: 0,
            filter: "blur(0)",
            duration: 1,
            delay: 1.2,
            ease: "power2.out"
          });
        }
      }
    }

    // ScrollTrigger 초기화
    function initScrollTriggers() {
      // 섹션0 페이드 아웃
      gsap.to("#section0", {
        opacity: 0,
        duration: 1.5,
        scrollTrigger: {
          trigger: "#section1",
          start: "top 80%",
          end: "top 20%",
          toggleActions: "play none none reverse",
          scrub: 0.8
        }
      });

      // 모든 섹션 페이드 인
      gsap.utils.toArray(".scroll-section").forEach(section => {
        if (section.id === "section0") return;

        gsap.to(section, {
          opacity: 1,
          y: 0,
          duration: 1.5,
          scrollTrigger: {
            trigger: section,
            start: "top bottom",
            end: "top 30%",
            toggleActions: "play none none reverse",
            scrub: 0.8
          }
        });

        // 비디오 애니메이션
        const video = section.querySelector(".scroll-video");
        if (video) {
          gsap.to(video, {
            y: 0,
            opacity: 1,
            scale: 1,
            filter: "blur(0)",
            duration: 1.8,
            delay: 0.7,
            scrollTrigger: {
              trigger: section,
              start: "top 75%",
              end: "top 40%",
              scrub: 0.6
            }
          });
        }
      });
    }

    // 마우스 효과
    (function() {
      const container = document.querySelector(".container");
      const circle = document.querySelector(".circle");
      
      if (circle) {
        let circleHalf = circle.offsetWidth / 2;

        document.addEventListener("mousemove", function (e) {
          const randomSize = 100 + Math.random() * 400;
          const randomCircleHalf = randomSize / 3;

          let c = circle.cloneNode(true);
          c.style.width = randomSize + "px";
          c.style.height = randomSize + "px";
          c.style.left = e.pageX - randomCircleHalf + "px";
          c.style.top = e.pageY - randomCircleHalf + "px";
          circle.style.left = e.pageX - circleHalf + "px";
          circle.style.top = e.pageY - circleHalf + "px";
          c.classList.add("fadeOut");
          c.addEventListener("animationend", e => e.target.remove());
          container.appendChild(c);
        });

        window.addEventListener("resize", () => {
          circleHalf = circle.offsetWidth / 2;
          if (ScrollTrigger.getAll) {
            ScrollTrigger.refresh();
          }
        });
      }
    })();

    // 메인 실행
    (function () {
      const logo = document.getElementById('logo');
      if (logo) {
        logo.addEventListener('click', goToFirstPage);
      }

      window.scrollTo(0, 0);
      
      if (typeof gsap !== 'undefined') {
        gsap.registerPlugin(ScrollTrigger);
        
        window.addEventListener("load", () => {
          if (ScrollTrigger.getAll) {
            ScrollTrigger.refresh();
          }
          
          startSection0Animation();
          initScrollTriggers();
          setupNavigationButtons();

          setTimeout(() => {
            ScrollTrigger.refresh();
          }, 500);
        });
      }
    })();
  </script>
</body>
</html>
